      tbmq.msg.app.test_client:
#        - key: max.poll.records
#          value: "${TB_KAFKA_APP_TEST_CLIENT_MAX_POLL_RECORDS:512}"

# General service parameters
service:
  # Microservice type. Accepted values: tbmq.
  type: "${TB_SERVICE_TYPE:tbmq}"
  # Unique ID for this service. Autogenerated if empty.
  id: "${TB_SERVICE_ID:}"

# Actor system parameters
actors:
  system:
    # Number of messages the actor system will process per actor before switching to processing messages for the next actor.
    throughput: "${ACTORS_SYSTEM_THROUGHPUT:5}"
    # Thread pool size for the actor system scheduler.
    scheduler-pool-size: "${ACTORS_SYSTEM_SCHEDULER_POOL_SIZE:1}"
    # Maximum number of attempts to initialize the actor before disabling it.
    max-actor-init-attempts: "${ACTORS_SYSTEM_MAX_ACTOR_INIT_ATTEMPTS:10}"
    processing-metrics:
      # Enables or disables actor processing metrics.
      enabled: "${ACTORS_SYSTEM_PROCESSING_METRICS_ENABLED:false}"
    # Time the actor system waits during TBMQ node shutdown to process client disconnections (in ms).
    disconnect-wait-timeout-ms: "${ACTORS_SYSTEM_DISCONNECT_WAIT_TIMEOUT_MS:15000}"
  persisted-device:
    # Number of threads processing the Device actor's messages.
    dispatcher-pool-size: "${ACTORS_SYSTEM_PERSISTED_DEVICE_DISPATCHER_POOL_SIZE:8}"
    # Time to wait before deleting the Device actor after disconnect (in minutes).
    wait-before-actor-stop-minutes: "${ACTORS_SYSTEM_PERSISTED_DEVICE_WAIT_BEFORE_ACTOR_STOP_MINUTES:5}"
  client:
    # Number of threads processing the MQTT client actor messages.
    dispatcher-pool-size: "${ACTORS_SYSTEM_CLIENT_DISPATCHER_POOL_SIZE:8}"
    # Time to wait before stopping the actor for clients that did not specify a client ID (in s).
    wait-before-generated-actor-stop-seconds: "${ACTORS_SYSTEM_CLIENT_WAIT_BEFORE_GENERATED_ACTOR_STOP_SECONDS:10}"
    # Time to wait before stopping the actor for clients that specified a client ID (in s).
    wait-before-named-actor-stop-seconds: "${ACTORS_SYSTEM_CLIENT_WAIT_BEFORE_NAMED_ACTOR_STOP_SECONDS:60}"
  rule:
    # Thread pool size for the mail sender executor service.
    mail_thread_pool_size: "${ACTORS_RULE_MAIL_THREAD_POOL_SIZE:4}"
    # Thread pool size for the password reset emails executor service.
    mail_password_reset_thread_pool_size: "${ACTORS_RULE_MAIL_PASSWORD_RESET_THREAD_POOL_SIZE:4}"

# Platform integrations parameters
integrations:
  init:
    # Timeout for API connection check requests (in s).
    connection-check-api-request-timeout-sec: "${INTEGRATIONS_INIT_CONNECTION_CHECK_API_REQUEST_TIMEOUT_SEC:20}"
  cleanup:
    # Execution period of the cleanup task for disconnected integrations (in s). Defaults to three hours.
    period: "${INTEGRATIONS_CLEANUP_PERIOD_SEC:10800}"
    # Administration TTL for cleaning up disconnected integrations (in s). The cleanup removes topics that persist messages.
    # Defaults to one week. A value of 0 or negative disables this TTL.
    ttl: "${INTEGRATIONS_CLEANUP_TTL_SEC:604800}"

# Database time series parameters
database:
  # Maximum number of DB queries generated by a single API call to fetch time series records.
  ts_max_intervals: "${DATABASE_TS_MAX_INTERVALS:700}"

# SQL configuration parameters
sql:
  # Enables or disables sorting of entities before batch update. Should be enabled in cluster mode to avoid deadlocks.
  batch_sort: "${SQL_BATCH_SORT:true}"
  # Partitioning size for timestamp key-value storage. Accepted values: DAYS, MONTHS, YEARS, INDEFINITE.
  ts_key_value_partitioning: "${SQL_TS_KV_PARTITIONING:DAYS}"
  # Enables or disables removal of null characters from strValue before insert.
  remove_null_chars: "${SQL_REMOVE_NULL_CHARS:true}"
  ts:
    # Batch size for persisting time series inserts.
    batch_size: "${SQL_TS_BATCH_SIZE:1000}"
    # Maximum timeout for time series entries queue polling (in ms).
    batch_max_delay: "${SQL_TS_BATCH_MAX_DELAY_MS:100}"
    # Number of threads that execute batch insert/update statements for time series data. Must be a prime number (e.g., 3 or 5) for optimal hash distribution.
    batch_threads: "${SQL_TS_BATCH_THREADS:3}"
  ts_latest:
    # Batch size for persisting latest time series inserts.
    batch_size: "${SQL_TS_LATEST_BATCH_SIZE:1000}"
    # Maximum timeout for latest time series entries queue polling (in ms).
    batch_max_delay: "${SQL_TS_LATEST_BATCH_MAX_DELAY_MS:50}"
    # Number of threads that execute batch insert/update statements for latest time series data. Must be a prime number (e.g., 3 or 5) for optimal hash distribution.
    batch_threads: "${SQL_TS_LATEST_BATCH_THREADS:3}"
  unauthorized-client:
    insert:
      # Batch size for persisting unauthorized client inserts.
      batch_size: "${SQL_UNAUTHORIZED_CLIENT_INSERT_BATCH_SIZE:1000}"
      # Maximum timeout for unauthorized client insert entries queue polling (in ms).
      batch_max_delay: "${SQL_UNAUTHORIZED_CLIENT_INSERT_BATCH_MAX_DELAY_MS:50}"
      # Number of threads that execute batch insert/update statements for unauthorized client data. Must be a prime number (e.g., 3 or 5) for optimal hash distribution.
      batch_threads: "${SQL_UNAUTHORIZED_CLIENT_INSERT_BATCH_THREADS:3}"
    delete:
      # Batch size for processing unauthorized client deletes.
      batch_size: "${SQL_UNAUTHORIZED_CLIENT_DELETE_BATCH_SIZE:1000}"
      # Maximum timeout for unauthorized client delete entries queue polling (in ms).
      batch_max_delay: "${SQL_UNAUTHORIZED_CLIENT_DELETE_BATCH_MAX_DELAY_MS:50}"
      # Number of threads that execute batch delete statements for unauthorized client data. Must be a prime number (e.g., 3 or 5) for optimal hash distribution.
      batch_threads: "${SQL_UNAUTHORIZED_CLIENT_DELETE_BATCH_THREADS:3}"
  events:
    # Batch size for persisting events updates.
    batch_size: "${SQL_EVENTS_BATCH_SIZE:10000}"
    # Maximum timeout for events entries queue polling (in ms).
    batch_max_delay: "${SQL_EVENTS_BATCH_MAX_DELAY_MS:100}"
    # Number of threads that execute batch insert/update statements for events. Must be a prime number (e.g., 3 or 5) for optimal hash distribution.
    batch_threads: "${SQL_EVENTS_BATCH_THREADS:3}"
    # Number of hours per events partition. Defaults to one week (168 h).
    partition_size: "${SQL_EVENTS_REGULAR_PARTITION_SIZE_HOURS:168}"
    # Maximum number of symbols per event. Event content will be truncated if it exceeds this limit.
    max-symbols: "${SQL_EVENTS_MAX_SYMBOLS:4096}"
  ttl:
    ts:
      # Enables or disables TTL (Time To Live) for time series records.
      enabled: "${SQL_TTL_TS_ENABLED:true}"
      # Execution period of the TTL task for time series records (in ms). Defaults to one day.
      execution_interval_ms: "${SQL_TTL_TS_EXECUTION_INTERVAL_MS:86400000}"
      # System TTL value for time series records (in s). Defaults to seven days. Use 0 to disable expiration.
      ts_key_value_ttl: "${SQL_TTL_TS_KEY_VALUE_TTL:604800}"
    unauthorized_client:
      # Enables or disables TTL (Time To Live) for unauthorized clients.
      enabled: "${SQL_TTL_UNAUTHORIZED_CLIENT_ENABLED:true}"
      # Execution period of the TTL task for unauthorized clients (in ms). Defaults to one day.
      execution_interval_ms: "${SQL_TTL_UNAUTHORIZED_CLIENT_EXECUTION_INTERVAL_MS:86400000}"
      # System TTL value for unauthorized clients (in s). Defaults to three days. Use 0 to disable expiration.
      ttl: "${SQL_TTL_UNAUTHORIZED_CLIENT_TTL:259200}"
    events:
      # Enables or disables TTL (Time To Live) for event records.
      enabled: "${SQL_TTL_EVENTS_ENABLED:true}"
      # Execution interval for the TTL cleanup task for events (in ms). Defaults to 1 hour.
      execution_interval_ms: "${SQL_TTL_EVENTS_EXECUTION_INTERVAL_MS:3600000}"
      # TTL for events (in s). Defaults to 14 days. Cleanup accuracy depends on the sql.events.partition_size parameter.
      events_ttl: "${SQL_TTL_EVENTS_TTL_SEC:1209600}"

# Redis lettuce configuration parameters
lettuce:
  # Enables or disables auto-flush. If disabled, commands are buffered and flushed based on cmd count or time interval.
  auto-flush: "${REDIS_LETTUCE_CMDS_AUTO_FLUSH_ENABLED:true}"
  # Number of buffered commands before flush is triggered. Used when auto-flush is disabled.
  buffered-cmd-count: "${REDIS_LETTUCE_BUFFERED_CMDS_COUNT:5}"
  # Maximum time to buffer commands before flushing, regardless of cmd count (in ms).
  flush-interval-ms: "${REDIS_LETTUCE_FLUSH_INTERVAL_MS:5}"
  config:
    # Maximum time to wait for a Lettuce command to complete (in s).
    # Affects health checks and any command execution (e.g. GET, SET, PING).
    # Reduce this value to fail fast if Redis is unresponsive.
    command-timeout: "${REDIS_LETTUCE_COMMAND_TIMEOUT_SEC:30}"
    # Quiet period for the Lettuce client shutdown (in s).
    shutdown-quiet-period: "${REDIS_LETTUCE_SHUTDOWN_QUIET_PERIOD_SEC:1}"
    # Shutdown timeout for the Lettuce client (in s).
    shutdown-timeout: "${REDIS_LETTUCE_SHUTDOWN_TIMEOUT_SEC:10}"
    cluster:
      topology-refresh:
        # Enables or disables periodic cluster topology updates.
        # Useful for Redis Cluster setup to handle topology changes,
        # such as node failover, restarts, or IP address changes.
        enabled: "${REDIS_LETTUCE_CLUSTER_TOPOLOGY_REFRESH_ENABLED:false}"
        # Interval for periodic cluster topology updates (in s).
        period: "${REDIS_LETTUCE_CLUSTER_TOPOLOGY_REFRESH_PERIOD_SEC:60}"

# Redis jedis configuration parameters
jedis:
  cluster:
    topology-refresh:
      # Enables or disables periodic cluster topology updates.
      # Useful for Redis cluster setup to handle topology changes,
      # such as node failover, restarts, or IP address changes.
      enabled: "${REDIS_JEDIS_CLUSTER_TOPOLOGY_REFRESH_ENABLED:false}"
      # Interval for periodic cluster topology updates (in s).
      period: "${REDIS_JEDIS_CLUSTER_TOPOLOGY_REFRESH_PERIOD_SEC:60}"

# SQL DAO configuration parameters
spring:
  data:
    jpa:
      repositories:
        # Enables or disables the Spring Data JPA repositories support.
        enabled: "${SPRING_DATA_JPA_REPOSITORIES_ENABLED:true}"
  jpa:
    # Enables or disables OSIV.
    open-in-view: "${SPRING_JPA_OPEN_IN_VIEW:false}"
    hibernate:
      # Hibernate DDL behavior. Accepted values: none, validate, update, create-drop.
      # Spring Boot chooses a default based on whether it thinks your database is embedded (default create-drop) or not (default none).
      ddl-auto: "${SPRING_JPA_HIBERNATE_DDL_AUTO:none}"
  datasource:
    # Database driver for Spring JPA.
    driverClassName: "${SPRING_DRIVER_CLASS_NAME:org.postgresql.Driver}"
    # Database connection URL.
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/thingsboard_mqtt_broker}"
    # Database username.
    username: "${SPRING_DATASOURCE_USERNAME:postgres}"
    # Database user password.
    password: "${SPRING_DATASOURCE_PASSWORD:postgres}"
    hikari:
      # Maximum number of connections in the pool. Grows with demand to prevent resource exhaustion affecting performance and availability.
      maximumPoolSize: "${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:16}"
      # Maximum lifetime of a connection (in ms). The connection is removed only when closed. Defaults to 10 minutes.
      maxLifetime: "${SPRING_DATASOURCE_MAX_LIFETIME:600000}"
      # Maximum time HikariCP will wait to acquire a connection from the pool (in ms).
      # If exceeded, an exception is thrown. Defaults to 30 s.
      connectionTimeout: "${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}"

# General Spring parameters
spring.lifecycle.timeout-per-shutdown-phase: "${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:1m}" # The server waits for active requests to finish up to the specified time before graceful shutdown.
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation: "${SPRING_JPA_HIBERNATE_JDBC_LOB_NON_CONTEXTUAL_CREATION:true}" # Setting this property to true disables contextual LOB creation and forces Hibernate's own LOB implementation. Fixes Postgres JPA error.
spring.jpa.properties.hibernate.order_by.default_null_ordering: "${SPRING_JPA_HIBERNATE_ORDER_BY_DEFAULT_NULL_ORDERING:last}" # Default ordering for null values.
spring.data.redis.repositories.enabled: "${SPRING_DATA_REDIS_REPOSITORIES_ENABLED:false}" # Disables Redis repositories scanning.
spring.freemarker.checkTemplateLocation: "${SPRING_FREEMARKER_CHECK_TEMPLATE_LOCATION:false}" # Spring Freemarker configuration to check that the templates location exists.
spring.mvc.async.request-timeout: "${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:30000}" # Default timeout for asynchronous requests (in ms).
spring.mvc.pathmatch.matching-strategy: "${SPRING_MVC_PATH_MATCH_MATCHING_STRATEGY:ANT_PATH_MATCHER}" # Path matching strategy used for Swagger endpoints.

# Security parameters
security:
  # JWT Token parameters.
  jwt:
    # User JWT Token expiration time (in s). Defaults to 2.5 hours.
    tokenExpirationTime: "${JWT_TOKEN_EXPIRATION_TIME:9000}"
    # User JWT Refresh Token expiration time (in s). Defaults to 1 week.
    refreshTokenExpTime: "${JWT_REFRESH_TOKEN_EXPIRATION_TIME:604800}"
    # User JWT Token issuer.
    tokenIssuer: "${JWT_TOKEN_ISSUER:thingsboard.io}"
    # User JWT Token sign key.
    tokenSigningKey: "${JWT_TOKEN_SIGNING_KEY:Qk1xUnloZ0VQTlF1VlNJQXZ4cWhiNWt1cVd1ZzQ5cWpENUhMSHlaYmZIM0JrZ2pPTVlhQ3N1Z0ZMUnd0SDBieg==}"
  # Enables or disables access to other Administrators' JWT tokens by the System Administrator.
  user_token_access_enabled: "${SECURITY_USER_TOKEN_ACCESS_ENABLED:true}"
  # Enables or disables case-sensitive username login.
  user_login_case_sensitive: "${SECURITY_USER_LOGIN_CASE_SENSITIVE:true}"
  # Unauthorized Clients configuration.
  unauth-clients:
    # Enables or disables persistence of unauthorized client connection attempts.
    # When disabled, unauthorized clients are logged only and are not stored.
    # When enabled, unauthorized client entries are persisted to the database.
    enabled: "${SECURITY_UNAUTH_CLIENTS_ENABLED:true}"

# MQTT parameters
mqtt:
  connect:
    # Number of threads for the client connection thread pool.
    threads: "${MQTT_CONNECT_THREADS:4}"
  # Enables or disables parallel processing of subscriptions for published messages.
  # Helpful when the PUBLISH message should be delivered to lots of subscribers.
  # It is recommended to measure the impact of this parameter before enabling it in production.
  msg-subscriptions-parallel-processing: "${MQTT_MSG_SUBSCRIPTIONS_PARALLEL_PROCESSING:false}"
  pre-connect-queue:
    # Maximum number of messages stored in the queue before the client connects and starts processing them.
    max-size: "${MQTT_PRE_CONNECT_QUEUE_MAX_SIZE:1000}"
  # Maximum number of PUBLISH messages not yet acknowledged.
  max-in-flight-msgs: "${MQTT_MAX_IN_FLIGHT_MSGS:1000}"
  flow-control:
    # Enables or disables the MQTT 5 flow control feature for the server. If disabled, the server will not control the number of messages sent to subscribers via "Receive Maximum".
    # Also applies to MQTT 3.x clients when enabled. "Receive Maximum" for MQTT 3.x clients can be configured using MQTT_FLOW_CONTROL_MQTT_3X_RECEIVE_MAX.
    enabled: "${MQTT_FLOW_CONTROL_ENABLED:true}"
    # Timeout to wait when there is nothing to process for flow control. A separate thread handles sending delayed messages to subscribers (in ms).
    # If no clients are affected by flow control restrictions, there is no need to continuously try to find and send such messages.
    timeout: "${MQTT_FLOW_CONTROL_TIMEOUT:1000}"
    # Time to store delayed messages for subscribers (in s). Delayed messages are those that cannot be sent immediately due to flow control restrictions.
    # Defaults to 10 minutes.
    ttl: "${MQTT_FLOW_CONTROL_TTL:600}"
    # Maximum allowed queue length for delayed messages — published to the client when the in-flight window is full.
    delayed-queue-max-size: "${MQTT_FLOW_CONTROL_DELAYED_QUEUE_MAX_SIZE:1000}"
    # Receive maximum value for MQTT 3.x clients.
    mqtt3x-receive-max: "${MQTT_FLOW_CONTROL_MQTT_3X_RECEIVE_MAX:65535}"
  keep-alive:
    # Interval between subsequent checks for inactive clients (in ms).
    monitoring-delay-ms: "${MQTT_KEEP_ALIVE_MONITORING_DELAY_MS:1000}"
    # Maximum keep-alive value allowed by the server (in s). Applies to MQTT v5 clients. Defaults to 10 minutes.
    max-keep-alive: "${MQTT_KEEP_ALIVE_MAX_KEEP_ALIVE_SEC:600}"
  topic:
    # Maximum number of segments in topics. Excessively large values may cause processing errors. Defaults to 0, which disables the limit.
    max-segments-count: "${MQTT_TOPIC_MAX_SEGMENTS_COUNT:0}"
    # Maximum number of topic aliases per connection. Defaults to 0, which disables the Topic Alias feature.
    alias-max: "${MQTT_TOPIC_ALIAS_MAX:10}"
    # Minimum topic name length that the broker may replace with a topic alias (e.g., topics with more than 50 characters).
    min-length-for-alias-replacement: "${MQTT_TOPIC_MIN_LENGTH_FOR_ALIAS_REPLACEMENT:50}"
  subscription:
    # Controls whether clients are permitted to subscribe to the root multi-level wildcard "#".
    # If set to 'true' (default):
    #   Clients can subscribe to "#", receiving a copy of EVERY message published to the broker.
    #   This is useful for debugging or firehose-style monitoring services.
    # If set to 'false':
    #   Clients are explicitly denied permission to subscribe to the exact topic "#".
    #   They can still subscribe to specific paths (e.g., "sensors/#") or individual topics.
    #   Recommended for production to prevent accidental or malicious data leakage.
    allow-root-multi-level-wildcard: "${MQTT_SUBSCRIPTION_ROOT_MULTI_LVL_WILDCARD:true}"
  shared-subscriptions:
    # Processing strategy for distributing messages among clients in a shared subscription. Accepted values: ROUND_ROBIN.
    processing-type: "${MQTT_SHARED_SUBSCRIPTIONS_PROCESSING_TYPE:ROUND_ROBIN}"
  subscription-trie:
    # Maximum pause for clearing subscription storage from empty nodes (in ms).
    # If a wait is unsuccessful, subscribing clients will be resumed, but the clear will fail.
    wait-for-clear-lock-ms: "${MQTT_SUB_TRIE_WAIT_FOR_CLEAR_LOCK_MS:100}"
    # Cron job to schedule clearing of empty subscription nodes. Defaults to 'every day at midnight'.
    clear-nodes-cron: "${MQTT_SUB_TRIE_CLEAR_NODES_CRON:0 0 0 * * *}"
    # Timezone for the subscription clearing cron-job.
    clear-nodes-zone: "${MQTT_SUB_TRIE_CLEAR_NODES_ZONE:UTC}"
  retain-msg-trie:
    # Maximum pause for clearing retain msg storage from empty nodes (in ms).
    # If a wait is unsuccessful, retain messages processing will be resumed, but the clear will fail.
    wait-for-clear-lock-ms: "${MQTT_RETAIN_MSG_TRIE_WAIT_FOR_CLEAR_LOCK_MS:100}"
    # Cron job to schedule clearing of empty retain msg nodes. Defaults to 'every day at midnight'.
    clear-nodes-cron: "${MQTT_RETAIN_MSG_TRIE_CLEAR_NODES_CRON:0 0 0 * * *}"
    # Timezone for the retain msg clearing cron-job.
    clear-nodes-zone: "${MQTT_RETAIN_MSG_TRIE_CLEAR_NODES_ZONE:UTC}"
  retain-msg:
    # Processing period for clearing retained messages by the MQTT expiry feature (in ms).
    expiry-processing-period-ms: "${MQTT_RETAIN_MSG_EXPIRY_PROCESSING_PERIOD_MS:60000}"
  client-session-expiry:
    # Cron job to schedule clearing of expired and inactive client sessions. Defaults to 'every hour', e.g. at 20:00:00 UTC.
    cron: "${MQTT_CLIENT_SESSION_EXPIRY_CRON:0 0 * ? * *}"
    # Timezone for the client sessions clearing cron-job.
    zone: "${MQTT_CLIENT_SESSION_EXPIRY_ZONE:UTC}"
    # Maximum allowed expiry interval for inactive sessions (in s). Defaults to one week.
    max-expiry-interval: "${MQTT_CLIENT_SESSION_EXPIRY_MAX_EXPIRY_INTERVAL:604800}"
    # Administration TTL for clearing sessions that do not expire by session expiry interval (in s).
    # (e.g. MQTTv3 cleanSession=false or MQTTv5 cleanStart=false && sessionExpiryInterval == 0).
    # Defaults to one week. A value of 0 or negative disables this TTL.
    ttl: "${MQTT_CLIENT_SESSION_EXPIRY_TTL:604800}"
  version-3-1:
    # Maximum client ID length for MQTT 3.1.
    max-client-id-length: "${MQTT_3_1_MAX_CLIENT_ID_LENGTH:1024}"
  # If enabled, each message published to non-persistent subscribers is flushed immediately. If disabled, messages are buffered and flushed periodically.
  write-and-flush: "${MQTT_MSG_WRITE_AND_FLUSH:true}"
  # Number of messages buffered in the channel before the flush is made. Used when `MQTT_MSG_WRITE_AND_FLUSH` = false.
  buffered-msg-count: "${MQTT_BUFFERED_MSG_COUNT:5}"
  buffered-delivery:
    # When either `MQTT_MSG_WRITE_AND_FLUSH` or `MQTT_PERSISTENT_MSG_WRITE_AND_FLUSH` is set to false,
    # the broker buffers outgoing messages in the outbound channel to improve throughput.
    # The respective buffer sizes are controlled by `MQTT_BUFFERED_MSG_COUNT` (for non-persistent clients)
    # and `MQTT_PERSISTENT_BUFFERED_MSG_COUNT` (for persistent clients).
    # Maximum number of session entries stored in the flush state cache.
    # When the cache exceeds this size, the least recently used sessions are evicted
    # and their pending message buffers are flushed automatically.
    session-cache-max-size: "${MQTT_BUFFERED_CACHE_MAX_SIZE:10000}"
    # Expiry time for an inactive session entry in the flush cache (in ms).
    # A session is considered inactive if it receives no new messages during this period.
    # Upon expiration, the session is evicted from the cache and its buffer is flushed.
    # Defaults to 5 minutes.
    session-cache-expiration-ms: "${MQTT_BUFFERED_CACHE_EXPIRY_MS:300000}"
    # Interval at which the scheduler checks all sessions in the cache for potential flushing (in ms).
    # A smaller value results in more frequent flush checks.
    scheduler-execution-interval-ms: "${MQTT_BUFFERED_SCHEDULER_INTERVAL_MS:100}"
    # Maximum time a session can remain idle before its message buffer is automatically flushed to the client (in ms).
    # A flush occurs either when the buffer limit is reached or when this timeout elapses.
    idle-session-flush-timeout-ms: "${MQTT_BUFFERED_IDLE_FLUSH_MS:200}"
  persistent-session:
    device:
      persisted-messages:
        # Maximum number of PUBLISH messages stored for each persisted DEVICE client.
        limit: "${MQTT_PERSISTENT_SESSION_DEVICE_PERSISTED_MESSAGES_LIMIT:10000}"
        # TTL of persisted DEVICE messages (in s). Defaults to one week.
        ttl: "${MQTT_PERSISTENT_SESSION_DEVICE_PERSISTED_MESSAGES_TTL:604800}"
        # If enabled, each message published to persistent DEVICE client subscribers is flushed immediately. If disabled, messages are buffered and flushed periodically.
        write-and-flush: "${MQTT_PERSISTENT_MSG_WRITE_AND_FLUSH:true}"
        # Number of messages buffered in the channel before the flush is made. Used when `MQTT_PERSISTENT_MSG_WRITE_AND_FLUSH` = false.
        buffered-msg-count: "${MQTT_PERSISTENT_BUFFERED_MSG_COUNT:5}"
    app:
      persisted-messages:
        # If enabled, each message published to persistent APPLICATION client subscribers is flushed immediately. If disabled, messages are buffered and flushed periodically.
        write-and-flush: "${MQTT_APP_MSG_WRITE_AND_FLUSH:false}"
        # Number of messages buffered in the channel before the flush is made. Used when `MQTT_APP_MSG_WRITE_AND_FLUSH` = false.
        buffered-msg-count: "${MQTT_APP_BUFFERED_MSG_COUNT:10}"
  rate-limits:
    # Number of parallel threads dedicated to processing total rate limit checks for incoming messages.
    threads-count: "${MQTT_RATE_LIMITS_THREADS_COUNT:1}"
    # Number of messages to process in each batch when checking total rate limits for incoming messages.
    batch-size: "${MQTT_RATE_LIMITS_BATCH_SIZE:50}"
    # Period to wait before processing a batch of messages for total rate limits (in ms).
    period-ms: "${MQTT_RATE_LIMITS_PERIOD_MS:50}"
    total:
      # Enables or disables total incoming and outgoing messages rate limits for the broker (per whole cluster).
      enabled: "${MQTT_TOTAL_RATE_LIMITS_ENABLED:false}"
      # Limits the total count of incoming and outgoing messages per time interval (in s). Comma-separated list of limit:seconds pairs.
      # Example: 1000 messages per second or 50000 messages per minute.
      config: "${MQTT_TOTAL_RATE_LIMITS_CONFIG:1000:1,50000:60}"
    incoming-publish:
      # Enables or disables publish rate limits per client for incoming messages to the broker.
      enabled: "${MQTT_INCOMING_RATE_LIMITS_ENABLED:false}"
      # Limits the count of publish messages per publisher per time interval (in s). Comma-separated list of limit:seconds pairs.
      # Example: 10 messages per second or 300 messages per minute.
      client-config: "${MQTT_INCOMING_RATE_LIMITS_CLIENT_CONFIG:10:1,300:60}"
    outgoing-publish:
      # Enables or disables publish rate limits per client for outgoing messages to subscribers. Applies only to non-persistent subscribers with QoS = 0 ("AT_MOST_ONCE").
      enabled: "${MQTT_OUTGOING_RATE_LIMITS_ENABLED:false}"
      # Limits the count of publish messages per subscriber per time interval (in s). Comma-separated list of limit:seconds pairs.
      # Example: 10 messages per second or 300 messages per minute.
      client-config: "${MQTT_OUTGOING_RATE_LIMITS_CLIENT_CONFIG:10:1,300:60}"
    device-persisted-messages:
      # Enables or disables Device clients persisted messages rate limits for the broker (per whole cluster).
      enabled: "${MQTT_DEVICE_PERSISTED_MSGS_RATE_LIMITS_ENABLED:false}"
      # Limits the count of Device clients persisted messages per time interval (in s). Comma-separated list of limit:seconds pairs.
      # Example: 100 messages per second or 1000 messages per minute.
      config: "${MQTT_DEVICE_PERSISTED_MSGS_RATE_LIMITS_CONFIG:100:1,1000:60}"
  # Total limit of sessions (connected + disconnected) stored on the broker, applied collectively across the cluster, not per node.
  # For example, when set to 1000, the entire cluster can store 1000 sessions in total. This is a soft limit, meaning slightly more sessions may be stored.
  # Defaults to 0, which disables the limit.
  sessions-limit: "${MQTT_SESSIONS_LIMIT:0}"
  # Total limit for Application persistent clients and external system integrations. Defaults to 0, which disables the limit.
  application-clients-limit: "${MQTT_APPLICATION_CLIENTS_LIMIT:0}"
  handler:
    # Number of threads in the pool for processing all publish messages callbacks after sending them to Kafka.
    all_msg_callback_threads: "${MQTT_HANDLER_ALL_MSG_CALLBACK_THREADS:2}"
    # Number of threads in the pool for processing device persisted publish messages callbacks after sending them to Kafka.
    device_msg_callback_threads: "${MQTT_HANDLER_DEVICE_MSG_CALLBACK_THREADS:2}"
    # Number of threads in the pool for processing application persisted publish messages callbacks after sending them to Kafka.
    app_msg_callback_threads: "${MQTT_HANDLER_APP_MSG_CALLBACK_THREADS:2}"
    # Number of threads in the pool for processing downlink messages callbacks after sending them to Kafka.
    downlink_msg_callback_threads: "${MQTT_HANDLER_DOWNLINK_MSG_CALLBACK_THREADS:2}"
  # Response info value for the MQTT 5 request-response feature, returned to clients that request it.
  # If not set, the broker will not reply with response info to MQTT 5 clients that connect with "request response info" = 1.
  # Set it to the topic to be used for the request-response feature, e.g. "example/".
  response-info: "${MQTT_RESPONSE_INFO:}"
  blocked-client:
    cleanup:
      # Execution period of the cleanup task for expired blocked clients (in minutes). Defaults to five minutes.
      period: "${BLOCKED_CLIENT_CLEANUP_PERIOD_MINUTES:5}"
      # TTL for expired blocked clients (in minutes). After this time, the expired blocked client is removed completely. Defaults to one week.
      ttl: "${BLOCKED_CLIENT_CLEANUP_TTL_MINUTES:10080}"

# Connectivity properties
device:
  connectivity:
    mqtts:
      # Path to the MQTT root CA certificate file.
      pem_cert_file: "${MQTTS_CA_CERT:cafile.pem}"
      # Filename for the downloaded MQTT root CA certificate.
      pem_cert_file_name: "${MQTTS_CA_CERT_NAME:tbmq-ca-cert.pem}"

# Cache parameters
cache:
  stats:
    # Enables or disables cache stats logging.
    enabled: "${CACHE_STATS_ENABLED:true}"
    # Cache stats logging interval (in s).
    intervalSec: "${CACHE_STATS_INTERVAL_SEC:60}"
  # Common prefix for all cache keys. Defaults to empty string, meaning no prefix is applied.
  cache-prefix: "${CACHE_PREFIX:}"
  specs:
    mqttClientCredentials:
      # Cache TTL (in minutes). Defaults to 1 day.
      timeToLiveInMinutes: "${CACHE_SPECS_MQTT_CLIENT_CREDENTIALS_TTL:1440}"
    basicCredentialsPassword:
      # Cache TTL (in minutes). Recommended to set a small value to limit credential storage duration (e.g., 1-5 minutes).
      timeToLiveInMinutes: "${CACHE_SPECS_BASIC_CREDENTIALS_PASSWORD_TTL:1}"
    sslRegexBasedCredentials:
      # Cache TTL (in minutes). Defaults to 1 day.
      timeToLiveInMinutes: "${CACHE_SPECS_SSL_REGEX_BASED_CREDENTIALS_TTL:1440}"
    clientSessionCredentials:
      # Cache TTL (in minutes). Defaults to 0, meaning the cache is eternal.
      timeToLiveInMinutes: "${CACHE_SPECS_CLIENT_SESSION_CREDENTIALS_TTL:0}"
    clientMqttVersion:
      # Cache TTL (in minutes). Defaults to 0, meaning the cache is eternal.
      timeToLiveInMinutes: "${CACHE_SPECS_CLIENT_MQTT_VERSION_TTL:0}"

# Redis configuration parameters
redis:
  connection:
    # Connection type. Accepted values: standalone, cluster, sentinel.
    type: "${REDIS_CONNECTION_TYPE:standalone}"
  standalone:
    # Redis connection host.
    host: "${REDIS_HOST:localhost}"
    # Redis connection port.
    port: "${REDIS_PORT:6379}"
    # Enables the default Redis client configuration.
    useDefaultClientConfig: "${REDIS_USE_DEFAULT_CLIENT_CONFIG:true}"
    # Client name. Applies only when not using the default ClientConfig.
    clientName: "${REDIS_CLIENT_NAME:standalone}"
    # Connection timeout (in ms). Applies only when not using the default ClientConfig.
    connectTimeout: "${REDIS_CLIENT_CONNECT_TIMEOUT:30000}"
    # Read timeout (in ms). Applies only when not using the default ClientConfig.
    readTimeout: "${REDIS_CLIENT_READ_TIMEOUT:60000}"
    # Enables pool config. Applies only when not using the default ClientConfig.
    usePoolConfig: "${REDIS_CLIENT_USE_POOL_CONFIG:false}"
  cluster:
    # Comma-separated list of "host:port" pairs to bootstrap from.
    nodes: "${REDIS_NODES:}"
    # Maximum number of redirects to follow when executing commands across the cluster.
    maxRedirects: "${REDIS_MAX_REDIRECTS:12}"
    # If set to false, pool config is built from the pool config section values.
    useDefaultPoolConfig: "${REDIS_CLUSTER_USE_DEFAULT_POOL_CONFIG:true}"
  sentinel:
    # Name of the master node.
    master: "${REDIS_MASTER:}"
    # Comma-separated list of "host:port" pairs of sentinels.
    sentinels: "${REDIS_SENTINELS:}"
    # Password to authenticate with the Sentinel.
    password: "${REDIS_SENTINEL_PASSWORD:}"
    # If set to false, pool config is built from the pool config section values.
    useDefaultPoolConfig: "${REDIS_SENTINEL_USE_DEFAULT_POOL_CONFIG:true}"
  # DB index.
  db: "${REDIS_DB:0}"
  # DB password.
  password: "${REDIS_PASSWORD:}"
  # Pool config.
  pool_config:
    # Maximum number of connections that can be allocated by the connection pool.
    maxTotal: "${REDIS_POOL_CONFIG_MAX_TOTAL:128}"
    # Maximum number of idle connections that can be maintained in the pool without being closed.
    maxIdle: "${REDIS_POOL_CONFIG_MAX_IDLE:128}"
    # Minimum number of idle connections that can be maintained in the pool without being closed.
    minIdle: "${REDIS_POOL_CONFIG_MIN_IDLE:16}"
    # Enables or disables the PING command sent when a connection is borrowed.
    testOnBorrow: "${REDIS_POOL_CONFIG_TEST_ON_BORROW:true}"
    # Enables or disables testing the connection before returning it to the pool.
    testOnReturn: "${REDIS_POOL_CONFIG_TEST_ON_RETURN:true}"
    # Enables or disables using the PING command to monitor connection validity during idle resource monitoring. Invalid connections are destroyed.
    testWhileIdle: "${REDIS_POOL_CONFIG_TEST_WHILE_IDLE:true}"
    # Minimum time a connection must be idle before it can be evicted from the pool (in ms).
    minEvictableMs: "${REDIS_POOL_CONFIG_MIN_EVICTABLE_MS:60000}"
    # Time interval between two consecutive eviction runs (in ms).
    evictionRunsMs: "${REDIS_POOL_CONFIG_EVICTION_RUNS_MS:30000}"
    # Maximum time a client is willing to wait for a connection from the pool when all connections are exhausted (in ms).
    maxWaitMills: "${REDIS_POOL_CONFIG_MAX_WAIT_MS:60000}"
    # Number of connections to test for eviction during each eviction run.
    numberTestsPerEvictionRun: "${REDIS_POOL_CONFIG_NUMBER_TESTS_PER_EVICTION_RUN:3}"
    # Determines whether to block when a thread requests a connection from an exhausted pool.
    blockWhenExhausted: "${REDIS_POOL_CONFIG_BLOCK_WHEN_EXHAUSTED:true}"

# Statistics parameters
stats:
  # Enables or disables stats printing to the logs.
  enabled: "${STATS_ENABLED:true}"
  # Print interval for statistics (in ms). Defaults to 1 minute.
  print-interval-ms: "${STATS_PRINT_INTERVAL_MS:60000}"
  timer:
    # Metrics percentiles returned by actuator for timer metrics. List of comma-separated double values.
    percentiles: "${STATS_TIMER_PERCENTILES:0.5}"
  application-processor:
    # Enables or disables specific Application clients stats.
    enabled: "${APPLICATION_PROCESSOR_STATS_ENABLED:true}"
  system-info:
    # Persistence frequency of system info such as CPU and memory usage (in s).
    persist-frequency: "${STATS_SYSTEM_INFO_PERSIST_FREQUENCY_SEC:60}"

# Historical data statistics parameters
historical-data-report:
  # Enables or disables historical data stats reporting and persistence to the time series.
  enabled: "${HISTORICAL_DATA_REPORT_ENABLED:true}"
  # Collection period for per-broker statistics (in minutes, range 1-60). Used in the cron expression.
  interval: "${HISTORICAL_DATA_REPORT_INTERVAL:1}"
  # Timezone for the historical data stats processing.
  zone: "${HISTORICAL_DATA_REPORT_ZONE:UTC}"

# Metrics management parameters
management:
  health:
    diskspace:
      # Enables or disables disk space health check.
      enabled: "${HEALTH_DISKSPACE_ENABLED:false}"
  endpoint:
    health:
      # Controls whether the health endpoint shows full component details (e.g., Redis, DB, TBMQ).
      # Accepted values:
      #   never: always hide details (default if security is enabled).
      #   when-authorized: show details only to authenticated users.
      #   always: always include full health details in the response.
      show-details: "${HEALTH_SHOW_DETAILS:never}"
  endpoints:
    web:
      exposure:
        # Actuator endpoints exposed via HTTP. Use 'health,info' to expose only basic health and information endpoints.
        # To expose Prometheus metrics, include 'prometheus' in the list (e.g., 'health,info,prometheus').
        include: "${METRICS_ENDPOINTS_EXPOSE:health,info,prometheus}"

# Spring CORS configuration
spring.mvc.cors:
  mappings:
    # Intercept path.
    "[/api/**]":
      # Comma-separated list of origins to allow. '*' allows all origins. When not set, CORS support is disabled.
      allowed-origin-patterns: "${MVC_CORS_API_ALLOWED_ORIGIN_PATTERNS:*}"
      # Comma-separated list of methods to allow. '*' allows all methods.
      allowed-methods: "${MVC_CORS_API_ALLOWED_METHODS:*}"
      # Comma-separated list of headers to allow in a request. '*' allows all headers.
      allowed-headers: "${MVC_CORS_API_ALLOWED_HEADERS:*}"
      # How long the response from a pre-flight request can be cached by clients (in s).
      max-age: "${MVC_CORS_API_MAX_AGE:1800}"
      # Enables or disables credentials support. Defaults to not supported when not set.
      allow-credentials: "${MVC_CORS_API_ALLOW_CREDENTIALS:true}"

# Spring doc common parameters
springdoc:
  # If false, Swagger API docs will be unavailable.
  api-docs.enabled: "${SWAGGER_ENABLED:true}"
  # Swagger default produces media-type.
  default-produces-media-type: "${SWAGGER_DEFAULT_PRODUCES_MEDIA_TYPE:application/json}"

# Swagger common parameters
swagger:
  # General Swagger match pattern for Swagger UI links.
  api_path: "${SWAGGER_API_PATH:/api/**}"
  # General Swagger security match pattern path for Swagger UI links.
  security_path_regex: "${SWAGGER_SECURITY_PATH_REGEX:/api/.*}"
  # Non-security API path match pattern for Swagger UI links.
  non_security_path_regex: "${SWAGGER_NON_SECURITY_PATH_REGEX:/api/noauth.*}"
  # Title on the API doc UI page.
  title: "${SWAGGER_TITLE:TBMQ REST API}"
  # Description on the API doc UI page.
  description: "${SWAGGER_DESCRIPTION:TBMQ open-source REST API documentation}"
  contact:
    # Contact name on the API doc UI page.
    name: "${SWAGGER_CONTACT_NAME:TBMQ team}"
    # Contact URL on the API doc UI page.
    url: "${SWAGGER_CONTACT_URL:https://thingsboard.io/products/mqtt-broker/}"
    # Contact email on the API doc UI page.
    email: "${SWAGGER_CONTACT_EMAIL:info@thingsboard.io}"
  license:
    # License title on the API doc UI page.
    title: "${SWAGGER_LICENSE_TITLE:Apache License Version 2.0}"
    # Link to the license body on the API doc UI page.
    url: "${SWAGGER_LICENSE_URL:https://github.com/thingsboard/tbmq/blob/main/LICENSE}"
  # Version of the API doc to display. Defaults to the package version.
  version: "${SWAGGER_VERSION:}"
  # Group name (definition) on the API doc UI page.
  group_name: "${SWAGGER_GROUP_NAME:TBMQ}"

# Application info parameters
app:
  # Application version.
  version: "@project.version@"

# Analysis parameters
analysis:
  log:
    # Enables or disables analysis logging.
    enabled: "${ANALYSIS_LOG_ENABLED:true}"
    # If true, log events for ALL clients (ignores analyzed-client-ids).
    all-clients: "${ANALYSIS_LOG_ALL_CLIENTS:false}"
    # Comma-separated list of client IDs for which additional events will be logged.
    # Example env var: ANALYSIS_LOG_CLIENT_IDS=client1,client2.
    analyzed-client-ids: "${ANALYSIS_LOG_CLIENT_IDS:}"
