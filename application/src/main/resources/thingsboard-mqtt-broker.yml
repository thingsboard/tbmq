      consumer-config: "${TB_KAFKA_HOME_PAGE_CONSUMER_CONFIG:}"
      # Time to wait for home page requests to Kafka to finish (in ms).
      kafka-response-timeout-ms: "${TB_KAFKA_HOME_PAGE_RESPONSE_TIMEOUT_MS:30000}"
