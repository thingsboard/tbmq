# HTTP server parameters
server:
  # HTTP Server bind address.
  address: "${HTTP_BIND_ADDRESS:0.0.0.0}"
  # HTTP Server bind port.
  port: "${HTTP_BIND_PORT:8082}"

# Kafka parameters
queue:
  integration-downlink:
    # Poll interval for messages from 'tbmq.ie.downlink' topics (in ms).
    poll-interval: "${TB_IE_DOWNLINK_POLL_INTERVAL:1000}"
  integration-msg:
    # Poll interval for messages from 'tbmq.msg.ie' topics (in ms).
    poll-interval: "${TB_IE_MSG_POLL_INTERVAL:1000}"
    # Timeout for processing a pack of messages (in ms).
    pack-processing-timeout: "${TB_IE_MSG_PACK_PROCESSING_TIMEOUT:30000}"
    ack-strategy:
      # Processing strategy for 'tbmq.msg.ie' topics. Accepted values: SKIP_ALL, RETRY_ALL.
      type: "${TB_IE_MSG_ACK_STRATEGY_TYPE:SKIP_ALL}"
      # Number of retries. Use 0 for unlimited. Applies to the RETRY_ALL strategy.
      retries: "${TB_IE_MSG_ACK_STRATEGY_RETRIES:5}"
      # Time to wait in the consumer thread before retrying (in s).
      pause-between-retries: "${TB_IE_MSG_ACK_STRATEGY_PAUSE_BETWEEN_RETRIES:1}"

  kafka:
    # List of Kafka bootstrap servers used to establish connection.
    bootstrap.servers: "${TB_KAFKA_SERVERS:localhost:9092}"
    # Enables or disables deletion of Kafka topics created for Integrations. When true, TBMQ may automatically
    # remove topics during cleanup (e.g., when an Integration is deleted). When false, TBMQ skips topic deletion
    # and simply stops using them, preventing accidental data loss in production environments.
    enable-topic-deletion: "${TB_KAFKA_ENABLE_TOPIC_DELETION:true}"
    default:
      # Base Kafka properties applied to admins, all producers and consumers, making it the ideal place for shared
      # connection and security settings. Format is key:value;key:value. If a property value contains a semicolon
      # (common in sasl.jaas.config), escape it with a backslash (e.g., ...username="user"\;password="pass"\;).
      config: "${TB_KAFKA_DEFAULT_PRODUCER_CONSUMER_CONFIG:}"
      consumer:
        # Additional Kafka properties specific only to consumers, merged with the global defaults —
        # TB_KAFKA_DEFAULT_PRODUCER_CONSUMER_CONFIG (overriding them if keys conflict).
        # Follows the standard key:value;key:value format. Ensure any internal semicolons in values are escaped as \;.
        config: "${TB_KAFKA_DEFAULT_CONSUMER_CONFIG:}"
        # List of partition assignment strategy class names or types, ordered by preference, used to distribute
        # partition ownership amongst consumer instances when group management is used.
        partition-assignment-strategy: "${TB_KAFKA_DEFAULT_CONSUMER_PARTITION_ASSIGNMENT_STRATEGY:org.apache.kafka.clients.consumer.StickyAssignor}"
        # Timeout for detecting client failures when using Kafka's group management facility (in ms).
        session-timeout-ms: "${TB_KAFKA_DEFAULT_CONSUMER_SESSION_TIMEOUT_MS:10000}"
        # Maximum delay between invocations of poll() when using consumer group management (in ms).
        max-poll-interval-ms: "${TB_KAFKA_DEFAULT_CONSUMER_MAX_POLL_INTERVAL_MS:300000}"
        # Maximum number of records returned in a single call to poll().
        max-poll-records: "${TB_KAFKA_DEFAULT_CONSUMER_MAX_POLL_RECORDS:2000}"
        # Maximum amount of data per partition the server will return (in bytes).
        max-partition-fetch-bytes: "${TB_KAFKA_DEFAULT_CONSUMER_MAX_PARTITION_FETCH_BYTES:16777216}"
        # Maximum amount of data the server should return for a fetch request (in bytes).
        fetch-max-bytes: "${TB_KAFKA_DEFAULT_CONSUMER_FETCH_MAX_BYTES:134217728}"
        # Expected time between heartbeats to the consumer coordinator when using Kafka's group management facilities.
        # Heartbeats ensure the consumer's session stays active and facilitate rebalancing when consumers join or leave.
        # Must be set lower than TB_KAFKA_DEFAULT_CONSUMER_SESSION_TIMEOUT_MS, but typically no higher than 1/3 of that value.
        # Can be adjusted lower to control the expected time for normal rebalances (in ms). Defaults to 3 s.
        heartbeat-interval-ms: "${TB_KAFKA_DEFAULT_CONSUMER_HEARTBEAT_INTERVAL_MS:3000}"
      producer:
        # Additional Kafka properties specific only to producers, merged with the global defaults —
        # TB_KAFKA_DEFAULT_PRODUCER_CONSUMER_CONFIG (overriding them if keys conflict).
        # Follows the standard key:value;key:value format. Ensure any internal semicolons in values are escaped as \;.
        config: "${TB_KAFKA_DEFAULT_PRODUCER_CONFIG:}"
        # Number of acknowledgments the producer requires the leader to have received before considering a request complete.
        acks: "${TB_KAFKA_DEFAULT_PRODUCER_ACKS:1}"
        # Number of retries for records whose send fails with a potentially transient error.
        retries: "${TB_KAFKA_DEFAULT_PRODUCER_RETRIES:1}"
        # Batch size for grouping records sent to the same partition (in bytes).
        batch-size: "${TB_KAFKA_DEFAULT_PRODUCER_BATCH_SIZE:16384}"
        # Delay for grouping records arriving between request transmissions into a batched request (in ms).
        linger-ms: "${TB_KAFKA_DEFAULT_PRODUCER_LINGER_MS:5}"
        # Total memory the producer can use to buffer records waiting to be sent to the server (in bytes).
        buffer-memory: "${TB_KAFKA_DEFAULT_PRODUCER_BUFFER_MEMORY:33554432}"
        # Compression type for all data generated by the producer. Accepted values: none, gzip, snappy, lz4, zstd.
        compression-type: "${TB_KAFKA_DEFAULT_COMPRESSION_TYPE:none}"
    admin:
      # Additional configs separated by semicolon for the admin Kafka client, merged with the global defaults —
      # TB_KAFKA_DEFAULT_PRODUCER_CONSUMER_CONFIG (overriding them if keys conflict).
      config: "${TB_KAFKA_ADMIN_CONFIG:retries:1}"
      # Kafka Admin client command timeout (in s). Applies to operations like describeCluster, listTopics, etc.
      command-timeout: "${TB_KAFKA_ADMIN_COMMAND_TIMEOUT_SEC:30}"
      # Kafka topics cache TTL (in ms). Defines how long the list of topics is kept in memory before reloading from Kafka. Defaults to 5 minutes.
      topics-cache-ttl-ms: "${TB_KAFKA_ADMIN_TOPICS_CACHE_TTL_MS:300000}"
    consumer-stats:
      # Enables or disables printing of consumer group lag between consumer offsets and the latest Kafka topic offsets.
      enabled: "${TB_KAFKA_CONSUMER_STATS_ENABLED:true}"
      # Print interval for Kafka consumer group statistics (in ms).
      print-interval-ms: "${TB_KAFKA_CONSUMER_STATS_PRINT_INTERVAL_MS:60000}"
      # Time to wait for stats-loading requests to Kafka to finish (in ms).
      kafka-response-timeout-ms: "${TB_KAFKA_CONSUMER_STATS_RESPONSE_TIMEOUT_MS:1000}"
      # Additional configs separated by semicolon for the Kafka stats consumer, merged with the consumer defaults —
      # TB_KAFKA_DEFAULT_CONSUMER_CONFIG (overriding them if keys conflict).
      consumer-config: "${TB_KAFKA_CONSUMER_STATS_CONSUMER_CONFIG:}"
    integration-downlink:
      # Prefix for topics used to send integration configurations and validation requests from TBMQ to integration executors.
      topic-prefix: "${TB_KAFKA_IE_DOWNLINK_TOPIC_PREFIX:tbmq.ie.downlink}"
      http:
        # Kafka topic properties separated by semicolon for the `tbmq.ie.downlink.http` topic.
        topic-properties: "${TB_KAFKA_IE_DOWNLINK_HTTP_TOPIC_PROPERTIES:retention.ms:604800000;segment.bytes:26214400;retention.bytes:1048576000;partitions:6;replication.factor:1}"
        # Additional Kafka consumer configs separated by semicolon for the `tbmq.ie.downlink.http` topic.
        additional-consumer-config: "${TB_KAFKA_IE_DOWNLINK_HTTP_ADDITIONAL_CONSUMER_CONFIG:}"
        # Additional Kafka producer configs separated by semicolon for the `tbmq.ie.downlink.http` topic.
        additional-producer-config: "${TB_KAFKA_IE_DOWNLINK_HTTP_ADDITIONAL_PRODUCER_CONFIG:}"
      kafka:
        # Kafka topic properties separated by semicolon for the `tbmq.ie.downlink.kafka` topic.
        topic-properties: "${TB_KAFKA_IE_DOWNLINK_KAFKA_TOPIC_PROPERTIES:retention.ms:604800000;segment.bytes:26214400;retention.bytes:1048576000;partitions:6;replication.factor:1}"
        # Additional Kafka consumer configs separated by semicolon for the `tbmq.ie.downlink.kafka` topic.
        additional-consumer-config: "${TB_KAFKA_IE_DOWNLINK_KAFKA_ADDITIONAL_CONSUMER_CONFIG:}"
        # Additional Kafka producer configs separated by semicolon for the `tbmq.ie.downlink.kafka` topic.
        additional-producer-config: "${TB_KAFKA_IE_DOWNLINK_KAFKA_ADDITIONAL_PRODUCER_CONFIG:}"
      mqtt:
        # Kafka topic properties separated by semicolon for the `tbmq.ie.downlink.mqtt` topic.
        topic-properties: "${TB_KAFKA_IE_DOWNLINK_MQTT_TOPIC_PROPERTIES:retention.ms:604800000;segment.bytes:26214400;retention.bytes:1048576000;partitions:6;replication.factor:1}"
        # Additional Kafka consumer configs separated by semicolon for the `tbmq.ie.downlink.mqtt` topic.
        additional-consumer-config: "${TB_KAFKA_IE_DOWNLINK_MQTT_ADDITIONAL_CONSUMER_CONFIG:}"
        # Additional Kafka producer configs separated by semicolon for the `tbmq.ie.downlink.mqtt` topic.
        additional-producer-config: "${TB_KAFKA_IE_DOWNLINK_MQTT_ADDITIONAL_PRODUCER_CONFIG:}"
    integration-uplink:
      # Topic for sending messages and events from integration executors to TBMQ.
      topic: "${TB_KAFKA_IE_UPLINK_TOPIC:tbmq.ie.uplink}"
      # Kafka topic properties separated by semicolon for the `tbmq.ie.uplink` topic.
      topic-properties: "${TB_KAFKA_IE_UPLINK_TOPIC_PROPERTIES:retention.ms:604800000;segment.bytes:26214400;retention.bytes:1048576000;partitions:6;replication.factor:1}"
      # Additional Kafka consumer configs separated by semicolon for the `tbmq.ie.uplink` topic.
      additional-consumer-config: "${TB_KAFKA_IE_UPLINK_ADDITIONAL_CONSUMER_CONFIG:}"
      # Additional Kafka producer configs separated by semicolon for the `tbmq.ie.uplink` topic.
      additional-producer-config: "${TB_KAFKA_IE_UPLINK_ADDITIONAL_PRODUCER_CONFIG:}"
    integration-uplink-notifications:
      # Prefix for topics used to send notifications or replies from integration executors to specific TBMQ nodes.
      topic-prefix: "${TB_KAFKA_IE_UPLINK_NOTIF_TOPIC_PREFIX:tbmq.ie.uplink.notifications}"
      # Kafka topic properties separated by semicolon for the `tbmq.ie.uplink.notifications` topics.
      topic-properties: "${TB_KAFKA_IE_UPLINK_NOTIF_TOPIC_PROPERTIES:retention.ms:604800000;segment.bytes:26214400;retention.bytes:1048576000;partitions:1;replication.factor:1}"
      # Additional Kafka consumer configs separated by semicolon for the `tbmq.ie.uplink.notifications` topic.
      additional-consumer-config: "${TB_KAFKA_IE_UPLINK_NOTIF_ADDITIONAL_CONSUMER_CONFIG:}"
      # Additional Kafka producer configs separated by semicolon for the `tbmq.ie.uplink.notifications` topic.
      additional-producer-config: "${TB_KAFKA_IE_UPLINK_NOTIF_ADDITIONAL_PRODUCER_CONFIG:}"
    integration-msg:
      # Kafka topic properties separated by semicolon for the `tbmq.msg.ie` topics.
      topic-properties: "${TB_KAFKA_IE_MSG_TOPIC_PROPERTIES:retention.ms:604800000;segment.bytes:26214400;retention.bytes:1048576000;replication.factor:1}"
      # Additional Kafka consumer configs separated by semicolon for the `tbmq.msg.ie` topics.
      additional-consumer-config: "${TB_KAFKA_IE_MSG_ADDITIONAL_CONSUMER_CONFIG:max.poll.records:50}"
      # Additional Kafka producer configs separated by semicolon for the `tbmq.msg.ie` topics.
      additional-producer-config: "${TB_KAFKA_IE_MSG_ADDITIONAL_PRODUCER_CONFIG:}"
    # Common prefix for all Kafka topics, producers, consumer groups, and consumers. Defaults to empty string, meaning no prefix is applied.
    kafka-prefix: "${TB_KAFKA_PREFIX:}"
    # Custom consumer configuration per Kafka topic.
    consumer-properties-per-topic:
      tbmq.msg.app.test_client:
#        - key: max.poll.records
#          value: "${TB_KAFKA_APP_TEST_CLIENT_MAX_POLL_RECORDS:512}"

# Service parameters
service:
  # Microservice type. Accepted values: tbmq-integration-executor.
  type: "${TB_SERVICE_TYPE:tbmq-integration-executor}"
  # Unique ID for this service. Autogenerated if empty.
  id: "${TB_SERVICE_ID:}"
  integrations:
    # Enables or disables specific integration types on this executor.
    # Accepted values: HTTP, KAFKA, MQTT. Defaults to ALL.
    supported: "${TB_SERVICE_INTEGRATIONS_SUPPORTED:ALL}"
    # List of integration types to exclude from processing on this executor.
    # Accepted values: HTTP, KAFKA, MQTT. Defaults to NONE.
    excluded: "${TB_SERVICE_INTEGRATIONS_EXCLUDED:NONE}"

# Integration common parameters
integrations:
  statistics:
    # Enables or disables integration statistics.
    enabled: "${INTEGRATIONS_STATISTICS_ENABLED:true}"
    # Persistence frequency for integration statistics (in ms).
    persist-frequency: "${INTEGRATIONS_STATISTICS_PERSIST_FREQUENCY:3600000}"
  init:
    # Maximum connection timeout allowed for integrations (in s). Any greater user-defined timeout will be reduced to this limit.
    connection-timeout-sec: "${INTEGRATIONS_INIT_CONNECTION_TIMEOUT_SEC:15}"
    # Timeout for API connection check requests (in s).
    connection-check-api-request-timeout-sec: "${INTEGRATIONS_INIT_CONNECTION_CHECK_API_REQUEST_TIMEOUT_SEC:20}"
  reinit:
    # Enables or disables hot reinitialization of integrations in 'FAILED' state.
    enabled: "${INTEGRATIONS_REINIT_ENABLED:true}"
    # Reinitialization check interval for failed integrations (in ms). Defaults to 5 minutes.
    frequency: "${INTEGRATIONS_REINIT_FREQUENCY_MS:300000}"
  destroy:
    # Duration to wait during each graceful shutdown iteration for integrations to terminate properly (in ms). Defaults to 1 s.
    graceful-timeout-ms: "${INTEGRATIONS_DESTROY_TIMEOUT_MS:1000}"
    # Number of graceful shutdown iterations before forcefully stopping the process.
    count: "${INTEGRATIONS_DESTROY_COUNT:10}"
    # Maximum duration to wait before forcefully stopping the application if graceful shutdown has not started or exceeded the allowed time (in ms).
    forced-shutdown-timeout-ms: "${INTEGRATIONS_DESTROY_FORCED_SHUTDOWN_TIMEOUT_MS:15000}"
  # Enables or disables access to local network hosts from integrations.
  allow-local-network-hosts: "${INTEGRATIONS_ALLOW_LOCAL_NETWORK_HOSTS:true}"
  uplink:
    # Number of threads in the pool to process callbacks of uplink events to TBMQ nodes.
    callback-threads-count: "${INTEGRATIONS_UPLINK_THREADS:4}"
  manage:
    # Number of threads in the pool to process lifecycle events (CREATE/UPDATE/DELETE) of integrations.
    lifecycle-threads-count: "${INTEGRATIONS_MANAGE_LIFECYCLE_THREADS:4}"
    # Number of threads in the pool to process integration validation requests.
    command-threads-count: "${INTEGRATIONS_MANAGE_COMMAND_THREADS:4}"
  external:
    # Number of threads in the pool dedicated to handling external operations, such as producing messages to Kafka topics.
    threads-count: "${INTEGRATIONS_EXTERNAL_THREADS:10}"
  netty:
    # Number of threads in the Netty shared worker group. Defaults to 0, which sets the count to availableProcessors * 2.
    # Used to send messages to external MQTT brokers using MQTT bridge (integration).
    threads-count: "${INTEGRATIONS_NETTY_SHARED_GROUP_THREADS:0}"

# Management parameters
management:
  health:
    diskspace:
      # Enables or disables disk space health check.
      enabled: "${HEALTH_DISKSPACE_ENABLED:false}"
  endpoint:
    health:
      # Controls whether the health endpoint shows full component details (e.g., Redis, DB, TBMQ).
      # Accepted values:
      #   never: always hide details (default if security is enabled).
      #   when-authorized: show details only to authenticated users.
      #   always: always include full health details in the response.
      show-details: "${HEALTH_SHOW_DETAILS:never}"
  endpoints:
    web:
      exposure:
        # Actuator endpoints exposed via HTTP. Use 'health,info' to expose only basic health and information endpoints.
        # To expose Prometheus metrics, include 'prometheus' in the list (e.g., 'health,info,prometheus').
        include: "${METRICS_ENDPOINTS_EXPOSE:health,info,prometheus}"

# Statistics parameters
stats:
  ie:
    # Enables or disables stats printing to the logs.
    enabled: "${STATS_IE_ENABLED:true}"
    # Print interval for integration executor statistics (in ms). Defaults to 1 minute.
    print-interval-ms: "${STATS_IE_PRINT_INTERVAL_MS:60000}"
  timer:
    # Metrics percentiles returned by actuator for timer metrics. List of comma-separated double values.
    percentiles: "${STATS_TIMER_PERCENTILES:0.5}"
  system-info:
    # Persistence frequency of system info such as CPU and memory usage (in s).
    persist-frequency: "${STATS_SYSTEM_INFO_PERSIST_FREQUENCY_SEC:60}"

# Event configuration parameters
event:
  error:
    rate-limits:
      # Enables or disables event error rate limiting.
      enabled: "${EVENT_ERROR_RATE_LIMITS_ENABLED:true}"
      # No more than 5000 messages per hour or 100 messages per minute for all integrations.
      integration: "${EVENT_ERROR_RATE_LIMITS_INTEGRATION:5000:3600,100:60}"
      # Time to suppress duplicate persistence of rate limit events after the error rate limit is reached (in minutes).
      ttl-minutes: "${EVENT_ERROR_RATE_LIMITS_TTL:60}"
